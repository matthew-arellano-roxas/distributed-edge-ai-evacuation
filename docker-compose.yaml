services:
  mediamtx:
    container_name: mediamtx
    image: bluenviron/mediamtx
    restart: unless-stopped
    ports:
      - "8554:8554"
      - "8888:8888"
      - "8889:8889"

  mqtt:
    container_name: mqtt
    image: eclipse-mosquitto:2
    restart: unless-stopped
    ports:
      - "${MQTT_PORT:-1883}:1883"

  redis:
    container_name: redis
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    container_name: backend
    build:
      context: ./app/backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3000
      MQTT_URL: ${MQTT_URL:-mqtt://mqtt:1883}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:5173}
      FIREBASE_SERVICE_ACCOUNT_PATH: ${FIREBASE_SERVICE_ACCOUNT_PATH:-/run/secrets/firebase-service-account.json}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID}
      FIREBASE_PRIVATE_KEY: ${FIREBASE_PRIVATE_KEY}
      FIREBASE_CLIENT_EMAIL: ${FIREBASE_CLIENT_EMAIL}
      FIREBASE_DATABASE_URL: ${FIREBASE_DATABASE_URL}
    volumes:
      - ${FIREBASE_SERVICE_ACCOUNT_FILE:-./secrets/firebase-service-account.json}:/run/secrets/firebase-service-account.json:ro
    depends_on:
      mqtt:
        condition: service_started
      redis:
        condition: service_healthy

  frontend:
    container_name: frontend
    build:
      context: ./app/frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:3000}
        VITE_FIREBASE_API_KEY: ${VITE_FIREBASE_API_KEY}
        VITE_FIREBASE_AUTH_DOMAIN: ${VITE_FIREBASE_AUTH_DOMAIN}
        VITE_FIREBASE_DATABASE_URL: ${VITE_FIREBASE_DATABASE_URL}
        VITE_FIREBASE_PROJECT_ID: ${VITE_FIREBASE_PROJECT_ID}
        VITE_FIREBASE_STORAGE_BUCKET: ${VITE_FIREBASE_STORAGE_BUCKET}
        VITE_FIREBASE_MESSAGING_SENDER_ID: ${VITE_FIREBASE_MESSAGING_SENDER_ID}
        VITE_FIREBASE_APP_ID: ${VITE_FIREBASE_APP_ID}
        VITE_FIREBASE_MEASUREMENT_ID: ${VITE_FIREBASE_MEASUREMENT_ID}
        VITE_CAMERA_PI5_CAM1_HLS_URL: ${VITE_CAMERA_PI5_CAM1_HLS_URL:-http://localhost:8888/pi5-cam-1/index.m3u8}
        VITE_CAMERA_PI5_CAM2_HLS_URL: ${VITE_CAMERA_PI5_CAM2_HLS_URL:-http://localhost:8888/pi5-cam-2/index.m3u8}
        VITE_CAMERA_PIZERO_CAM1_HLS_URL: ${VITE_CAMERA_PIZERO_CAM1_HLS_URL:-http://localhost:8888/pizero-cam-1/index.m3u8}
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    depends_on:
      backend:
        condition: service_started

volumes:
  redis_data:
