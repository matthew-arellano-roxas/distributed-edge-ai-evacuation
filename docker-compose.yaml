services:
  mqtt:
    container_name: mqtt
    image: eclipse-mosquitto:2
    restart: unless-stopped
    ports:
      - "1883:1883"

  app:
    container_name: backend
    build:
      context: ./app/backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      MQTT_URL: mqtt://mqtt:1883
      REDIS_URL: redis://localhost:6379
    depends_on:
      mqtt:
        condition: service_started
