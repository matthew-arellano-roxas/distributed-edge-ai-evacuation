; platformio.ini
;
; This is all you need — no manual lib_deps required.
; ESP32Easy/library.json declares PubSubClient + ArduinoJson
; and PlatformIO installs them automatically on first build.

[env:esp32dev]
platform      = espressif32
board         = esp32dev
framework     = arduino
monitor_speed = 115200
upload_speed  = 921600

; Only add lib_deps here if you need EXTRA libraries beyond ESP32Easy.
; Example:
lib_deps =
    knolleary/PubSubClient @ ^2.8
    bblanchon/ArduinoJson @ ^7.0